# End-to-end wheel install smoke test.
#
# Reproduces a real user's install: build the wheel with `python -m build`,
# install it in a venv OUTSIDE the repo tree (no editable install, no fallback
# to source), then import the public surface. Catches packaging bugs that a
# `hatch test` against editable source would miss — e.g. a wheel that
# misconfigures `[tool.hatch.build.targets.wheel].packages` and ships without
# the `strands_tools` package.
name: "Test Package Build"

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        description: 'If set, pin the wheel to this version via SETUPTOOLS_SCM_PRETEND_VERSION. Required at release time (the release tag does not exist yet, so hatch-vcs would otherwise derive a dev version). PR-time callers leave this empty.'
        required: false
        type: string
        default: ''

jobs:
  test-package-build:
    name: Wheel install
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install build tooling
        run: pip install --no-cache-dir build

      - name: Build wheel + sdist
        env:
          PINNED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$PINNED_VERSION" ]; then
            echo "Building with SETUPTOOLS_SCM_PRETEND_VERSION=$PINNED_VERSION"
            export SETUPTOOLS_SCM_PRETEND_VERSION="$PINNED_VERSION"
          else
            echo "No version pinned; hatch-vcs will derive from git tags."
          fi
          python -m build

      - name: Install wheel in a clean venv outside the repo and import
        # The venv MUST live outside the repo — otherwise pip can fall back to
        # the in-tree source if the wheel is incomplete, masking the bug we are
        # trying to catch.
        env:
          PINNED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          trap 'rm -rf "$WORK"' EXIT
          echo "Workspace: $WORK"

          WHEEL=$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.whl' -print -quit)
          if [ -z "$WHEEL" ]; then
            echo "::error::no wheel produced under dist/"
            exit 1
          fi
          echo "Wheel: $WHEEL"

          python -m venv "$WORK/venv"
          "$WORK/venv/bin/pip" install --upgrade pip
          "$WORK/venv/bin/pip" install "$WHEEL"

          # Import from a directory outside the source tree, so the only
          # resolvable `strands_tools` is the one from the wheel. When a version
          # is pinned, also assert the installed package reports it.
          cd "$WORK"
          if [ -n "$PINNED_VERSION" ]; then
            PINNED_VERSION="$PINNED_VERSION" "$WORK/venv/bin/python" - <<'PYEOF'
          import os
          from importlib.metadata import version
          import strands_tools  # ensure the wheel imports from a clean venv
          expected = os.environ["PINNED_VERSION"]
          actual = version("strands-agents-tools")
          assert actual == expected, f"strands-agents-tools version is {actual!r}, expected {expected!r}"
          print(f"version OK: {actual}")
          PYEOF
          else
            "$WORK/venv/bin/python" -c "import strands_tools; from importlib.metadata import version; print('strands-agents-tools version:', version('strands-agents-tools'))"
          fi

      # Upload for release.yml's inspect/publish path to consume.
      # PR-triggered runs also upload (short retention) — harmless.
      - name: Upload wheel + sdist for downstream inspect/publish
        uses: actions/upload-artifact@v4
        with:
          name: pypi-build-output
          path: dist/*
          if-no-files-found: error
          retention-days: 7
